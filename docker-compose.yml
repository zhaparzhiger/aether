services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aether-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether
      POSTGRES_DB: aether
    ports:
      - "5433:5432"
    volumes:
      - aether_pgdata:/var/lib/postgresql/data

volumes:
  aether_pgdata:
